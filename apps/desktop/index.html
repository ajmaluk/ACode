<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dalam</title>
    <!-- Prevent theme flash: apply saved theme before React mounts -->
    <script>
      (function() {
        try {
          var settings = JSON.parse(localStorage.getItem('dalam.settings.v1') || '{}');
          var theme = settings.theme || 'system';
          var resolved = theme;
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.style.colorScheme = resolved;
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {
          // Fallback: dark theme
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.colorScheme = 'dark';
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="font-sans antialiased">
    <!-- Splash screen: shown immediately, hidden when React mounts -->
    <div id="splash" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#1E1E1E;">
      <div style="text-align:center;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="80" height="80" style="filter:drop-shadow(0 0 20px rgba(79,142,247,0.3));">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
              <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect width="120" height="120" rx="28" fill="url(#grad)"/>
          <text x="60" y="82" text-anchor="middle" fill="white" font-family="'Newsreader','Georgia',serif" font-size="64" font-weight="600" font-style="italic">D</text>
        </svg>
        <div style="margin-top:20px;color:#6e6e6e;font-size:13px;font-family:system-ui,-apple-system,sans-serif;letter-spacing:0.05em;">Loading...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
    <script>
      // Hide splash screen when React mounts (observed via root child)
      (function() {
        var splash = document.getElementById('splash');
        var root = document.getElementById('root');
        if (!splash || !root) return;
        var obs = new MutationObserver(function() {
          if (root.children.length > 0) {
            splash.style.transition = 'opacity 0.3s ease';
            splash.style.opacity = '0';
            setTimeout(function() { splash.remove(); }, 300);
            obs.disconnect();
          }
        });
        obs.observe(root, { childList: true });
        // Fallback: remove after 5s no matter what
        setTimeout(function() { if (splash.parentNode) splash.remove(); }, 5000);
      })();
    </script>
  </body>
</html>
