<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Dalam</title>
    <!-- Prevent theme flash: apply saved theme before React mounts -->
    <script>
      (function() {
        try {
          var settings = JSON.parse(localStorage.getItem('dalam.settings.v1') || '{}');
          var theme = settings.theme || 'system';
          var resolved = theme;
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.style.colorScheme = resolved;
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {
          // Fallback: dark theme
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.colorScheme = 'dark';
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="font-sans antialiased">
    <!-- Splash screen: animated orb from icon.svg, hidden when boot completes -->
    <div id="splash" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#1E1E1E;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="120" height="120" role="img" aria-label="Dalam orb" style="filter:drop-shadow(0 0 30px rgba(107,0,255,0.4));">
        <defs>
          <filter id="marble-splash" x="-50%" y="-50%" width="200%" height="200%">
            <feTurbulence type="fractalNoise" baseFrequency="0.0120" numOctaves="2" seed="1" result="noise">
              <animate attributeName="baseFrequency" values="0.0086;0.0154;0.0120;0.0086" dur="1.56s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="36" xChannelSelector="R" yChannelSelector="G">
              <animate attributeName="scale" values="22;44;36;22" dur="1.32s" repeatCount="indefinite"/>
            </feDisplacementMap>
            <feGaussianBlur stdDeviation="0.8"/>
          </filter>
          <filter id="glow-splash">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
          <clipPath id="clip-splash">
            <circle cx="140" cy="140" r="135"/>
          </clipPath>
        </defs>
        <g clip-path="url(#clip-splash)">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0 140 140;4 140 140;-3 140 140;0 140 140" dur="2.25s" repeatCount="indefinite"/>
            <rect x="0" y="0" width="280" height="280" fill="#6b00ff"/>
            <circle cx="80" cy="100" r="120" fill="#00f0ff" opacity="0.8" filter="url(#marble-splash)">
              <animate attributeName="cy" values="100;120;90;100" dur="1.50s" repeatCount="indefinite"/>
              <animate attributeName="cx" values="80;100;70;80" dur="1.80s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.62;0.90;0.62" dur="1.08s" repeatCount="indefinite"/>
            </circle>
            <circle cx="200" cy="180" r="100" fill="#ff0099" opacity="0.8" filter="url(#marble-splash)">
              <animate attributeName="cy" values="180;160;190;180" dur="1.65s" repeatCount="indefinite"/>
              <animate attributeName="cx" values="200;180;210;200" dur="1.95s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.62;0.90;0.62" dur="1.08s" repeatCount="indefinite"/>
            </circle>
            <circle cx="140" cy="60" r="90" fill="#8b5cf6" opacity="0.7" filter="url(#marble-splash)">
              <animate attributeName="cy" values="60;80;50;60" dur="1.35s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.52;0.80;0.52" dur="1.08s" repeatCount="indefinite"/>
            </circle>
            <circle cx="50" cy="200" r="80" fill="#6b00ff" opacity="0.6" filter="url(#marble-splash)">
              <animate attributeName="cx" values="50;70;40;50" dur="1.35s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.45;0.70;0.45" dur="1.08s" repeatCount="indefinite"/>
            </circle>
          </g>
        </g>
        <ellipse cx="90" cy="80" rx="40" ry="30" fill="white" opacity="0.4" filter="url(#glow-splash)"/>
        <ellipse cx="100" cy="90" rx="20" ry="15" fill="white" opacity="0.6"/>
        <circle cx="140" cy="140" r="135" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
    <script>
      // Hide splash screen when app boot completes
      (function() {
        var splash = document.getElementById('splash');
        if (!splash) return;
        function hideSplash() {
          splash.style.transition = 'opacity 0.4s ease';
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 400);
        }
        // Listen for boot completion from React
        window.addEventListener('dalam:booted', hideSplash);
        // Fallback: remove after 8s no matter what
        setTimeout(function() { if (splash.parentNode) hideSplash(); }, 8000);
      })();
    </script>
  </body>
</html>
